<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto News - 暗号資産ニュース</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; background: #f5f6f8; color: #1a1a1a; line-height: 1.7; }
a { color: #1f6feb; text-decoration: none; }
a:hover { text-decoration: underline; }

/* 価格ティッカー */
.ticker-wrap { background: #0a0c10; border: 1px solid #21262d; border-radius: 8px; overflow: hidden; position: relative; }
.ticker-track { display: inline-flex; align-items: center; white-space: nowrap; padding: 0.55rem 0; animation: ticker-scroll 60s linear infinite; }
.ticker-wrap:hover .ticker-track { animation-play-state: paused; }
@keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.tk-item { display: inline-flex; align-items: baseline; margin: 0 1.4rem; font-variant-numeric: tabular-nums; }
.tk-sym { color: #f7931a; font-weight: bold; font-size: 0.9rem; margin-right: 0.5rem; letter-spacing: 0.03em; }
.tk-usd { color: #fff; font-size: 0.95rem; font-weight: 600; }
.tk-jpy { color: #8b949e; font-size: 0.72rem; margin-left: 0.4rem; }
.tk-chg { font-size: 0.75rem; margin-left: 0.45rem; }
.tk-up { color: #2ea043; }
.tk-down { color: #f85149; }

/* 銘柄を編集（バーの下） */
.ticker-tools { display: flex; justify-content: flex-end; margin: 0.4rem 0 1.2rem; }
.ticker-edit { display: inline-flex; align-items: center; gap: 0.3rem; background: none; border: none; color: #6e7681; cursor: pointer; font-size: 0.8rem; padding: 0.2rem 0.3rem; transition: color 0.15s; }
.ticker-edit svg { width: 14px; height: 14px; fill: currentColor; }
.ticker-edit:hover { color: #f7931a; }

header { background: #0d1117; color: #fff; padding: 1rem 0; }
.container { max-width: 880px; margin: 0 auto; padding: 0 1rem; }
.header-inner { display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 1.5rem; font-weight: bold; color: #fff; }
.logo span { color: #f7931a; }
.hero { background: #161b22; color: #fff; padding: 2.5rem 0; text-align: center; }
.hero h1 { font-size: 1.6rem; }
main { padding: 2rem 0; }
.news-meta { font-size: 0.85rem; color: #666; margin-top: 1.2rem; text-align: right; }
.news-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
.card { background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 1.2rem 1.4rem; transition: box-shadow 0.2s; }
.card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.card .cat { display: inline-block; background: #f7931a; color: #fff; font-size: 0.72rem; padding: 0.15rem 0.6rem; border-radius: 4px; margin-bottom: 0.6rem; }
.card h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
.card h2 a { color: #1a1a1a; }
.card h2 a:hover { color: #f7931a; text-decoration: none; }
.card .source { font-size: 0.82rem; color: #888; }
.card .source a { color: #1f6feb; }
.loading, .error { text-align: center; color: #888; padding: 2rem 0; }
footer { background: #0d1117; color: #c9d1d9; padding: 2rem 0; margin-top: 2rem; font-size: 0.85rem; }
.disclaimer { background: #161b22; border-radius: 8px; padding: 1rem 1.2rem; margin-bottom: 1.2rem; color: #8b949e; font-size: 0.8rem; }
.copy { text-align: center; color: #6e7681; }

/* 銘柄選択モーダル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 10px; max-width: 460px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 1.4rem; }
.modal h3 { font-size: 1.1rem; margin-bottom: 0.8rem; }
.modal h4 { font-size: 0.85rem; color: #444; margin: 1rem 0 0.5rem; }
.count-note { font-size: 0.75rem; color: #999; margin-bottom: 0.5rem; }
.count-note.full { color: #f85149; }

/* 有名どころクイック選択（均等幅でキレイに折り返す） */
.quick-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.45rem; margin-bottom: 0.4rem; }
.quick-opt { background: #f0f1f3; border: 1px solid #e1e4e8; border-radius: 6px; padding: 0.35rem 0; font-size: 0.85rem; cursor: pointer; text-align: center; }
.quick-opt:hover { background: #e6e8eb; }
.quick-opt.active { background: #f7931a; border-color: #f7931a; color: #fff; }

/* 検索 */
.search-box { width: 100%; padding: 0.55rem 0.7rem; border: 1px solid #d0d7de; border-radius: 6px; font-size: 0.9rem; margin-bottom: 0.5rem; }
.search-results { border: 1px solid #e1e4e8; border-radius: 6px; max-height: 180px; overflow-y: auto; }
.search-results:empty { display: none; }
.result-opt { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.7rem; cursor: pointer; font-size: 0.88rem; border-bottom: 1px solid #f0f1f3; }
.result-opt:last-child { border-bottom: none; }
.result-opt:hover { background: #f5f6f8; }
.result-opt .sym { color: #888; font-size: 0.8rem; margin-left: 0.5rem; }
.result-opt.added { color: #aaa; cursor: default; }
.search-hint { font-size: 0.78rem; color: #999; padding: 0.4rem 0.1rem; }

.modal-actions { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.2rem; }
.btn { padding: 0.5rem 1.1rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; }
.btn-primary { background: #f7931a; color: #fff; }
.btn-secondary { background: #eee; color: #333; }
</style>
</head>
<body>

<header>
<div class="container header-inner">
<div class="logo">Crypto<span>News</span></div>
</div>
</header>

<section class="hero">
<div class="container">
<h1>暗号資産の最新ニュースをお届け</h1>
</div>
</section>

<main id="news">
<div class="container">

<!-- 価格ティッカー -->
<div class="ticker-wrap">
<div class="ticker-track" id="ticker-track"><span class="tk-item"><span class="tk-usd">価格を読み込み中...</span></span></div>
</div>
<div class="ticker-tools">
<button class="ticker-edit" id="ticker-edit" type="button" aria-label="銘柄を編集">
<svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
<span>銘柄を編集</span>
</button>
</div>

<div class="news-grid" id="news-grid">
<div class="loading">読み込んでいます...</div>
</div>
<div class="news-meta" id="news-meta"></div>
</div>
</main>

<footer>
<div class="container">
<div class="disclaimer">
<strong>免責事項：</strong>当サイトは暗号資産に関する情報提供を目的としたものであり、特定の暗号資産への投資の勧誘・推奨を行うものではありません。掲載している見出しは各提供元メディアの公式配信（RSS）に基づくものであり、記事の詳細は各リンク先の提供元サイトでご確認ください。表示している価格は参考値であり、正確性を保証するものではありません。投資判断はご自身の責任において行ってください。
</div>
<div class="copy">© 2026 CryptoNews. All rights reserved.</div>
</div>
</footer>

<!-- 銘柄選択モーダル -->
<div class="modal-overlay" id="modal-overlay">
<div class="modal">
<h3>表示する銘柄を選択</h3>

<div class="count-note" id="count-note"></div>

<div class="quick-list" id="quick-list"></div>

<h4>検索して追加</h4>
<input type="text" class="search-box" id="search-box" placeholder="名前やシンボルで検索（例：shiba, TON, ATOM）">
<div class="search-hint" id="search-hint"></div>
<div class="search-results" id="search-results"></div>

<div class="modal-actions">
<button class="btn btn-secondary" id="modal-cancel" type="button">キャンセル</button>
<button class="btn btn-primary" id="modal-save" type="button">保存</button>
</div>
</div>
</div>

<script>
/* ===== 設定 ===== */
var MAX_COINS = 6;
var DEFAULT_COINS = ['bitcoin', 'ethereum', 'ripple', 'solana'];
var STORAGE_KEY = 'cryptonews_ticker_coins';
var FAMOUS = [
{ id: 'bitcoin', sym: 'BTC', name: 'ビットコイン' },
{ id: 'ethereum', sym: 'ETH', name: 'イーサリアム' },
{ id: 'ripple', sym: 'XRP', name: 'リップル' },
{ id: 'solana', sym: 'SOL', name: 'ソラナ' },
{ id: 'dogecoin', sym: 'DOGE', name: 'ドージコイン' },
{ id: 'binancecoin', sym: 'BNB', name: 'BNB' },
{ id: 'cardano', sym: 'ADA', name: 'カルダノ' },
{ id: 'tron', sym: 'TRX', name: 'トロン' }
];
var COIN_LABELS = {};
FAMOUS.forEach(function (c) { COIN_LABELS[c.id] = { sym: c.sym, name: c.name }; });

/* ===== ストレージ ===== */
function getSelectedCoins() {
try {
var saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
if (Array.isArray(saved) && saved.length > 0) return saved.slice(0, MAX_COINS);
} catch (e) {}
return DEFAULT_COINS.slice();
}
function getLabels() {
try {
var l = JSON.parse(localStorage.getItem(STORAGE_KEY + '_labels'));
if (l && typeof l === 'object') {
Object.keys(l).forEach(function (k) { COIN_LABELS[k] = l[k]; });
}
} catch (e) {}
}
getLabels();

/* ===== 表示フォーマット ===== */
function fmtUSD(v) {
if (v >= 1) return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 2 });
return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 6 });
}
function fmtJPY(v) {
if (v >= 1) return '¥' + Math.round(v).toLocaleString('ja-JP');
return '¥' + v.toLocaleString('ja-JP', { maximumFractionDigits: 4 });
}
function symFor(id) {
return (COIN_LABELS[id] && COIN_LABELS[id].sym) ? COIN_LABELS[id].sym : id.toUpperCase();
}

/* ===== 価格ティッカー ===== */
async function loadPrices() {
var track = document.getElementById('ticker-track');
var ids = getSelectedCoins();
try {
var url = 'https://api.coingecko.com/api/v3/simple/price?ids=' + encodeURIComponent(ids.join(',')) +
'&vs_currencies=usd,jpy&include_24hr_change=true';
var res = await fetch(url);
if (!res.ok) throw new Error('price fetch failed');
var data = await res.json();
var parts = [];
ids.forEach(function (id) {
var d = data[id];
if (!d || d.usd == null) return;
var chg = d.usd_24h_change;
var chgCls = chg >= 0 ? 'tk-up' : 'tk-down';
var chgTxt = (chg >= 0 ? '+' : '') + (chg != null ? chg.toFixed(2) : '0.00') + '%';
parts.push(
'<span class="tk-item">' +
'<span class="tk-sym">' + symFor(id) + '</span>' +
'<span class="tk-usd">' + fmtUSD(d.usd) + '</span>' +
'<span class="tk-jpy">' + (d.jpy != null ? fmtJPY(d.jpy) : '') + '</span>' +
'<span class="tk-chg ' + chgCls + '">' + chgTxt + '</span>' +
'</span>'
);
});
if (parts.length === 0) {
track.innerHTML = '<span class="tk-item"><span class="tk-usd">価格を表示できませんでした</span></span>';
return;
}
var html = parts.join('');
track.innerHTML = html + html;
track.style.animationDuration = (parts.length * 13) + 's';
} catch (e) {
track.innerHTML = '<span class="tk-item"><span class="tk-usd">価格の読み込みに失敗しました</span></span>';
}
}

/* ===== モーダル（選択UI） ===== */
var workingSelection = [];
var coinListCache = null;
var searchTimer = null;

function updateCount() {
var note = document.getElementById('count-note');
if (workingSelection.length >= MAX_COINS) {
note.textContent = '上限の' + MAX_COINS + '銘柄に達しています。追加するには他を外してください。';
note.className = 'count-note full';
} else {
note.textContent = workingSelection.length + ' / ' + MAX_COINS + ' 銘柄を選択中';
note.className = 'count-note';
}
}

function addCoin(id, sym, name) {
if (workingSelection.indexOf(id) !== -1) return;
if (workingSelection.length >= MAX_COINS) return;
if (sym) COIN_LABELS[id] = { sym: sym, name: name || sym };
workingSelection.push(id);
updateCount();
renderQuick();
}

function renderQuick() {
var ql = document.getElementById('quick-list');
ql.innerHTML = FAMOUS.map(function (c) {
var active = workingSelection.indexOf(c.id) !== -1 ? ' active' : '';
return '<button type="button" class="quick-opt' + active + '" data-id="' + c.id +
'" data-sym="' + c.sym + '" data-name="' + c.name + '">' + c.sym + '</button>';
}).join('');
Array.prototype.forEach.call(ql.querySelectorAll('.quick-opt'), function (b) {
b.addEventListener('click', function () {
var id = this.getAttribute('data-id');
if (workingSelection.indexOf(id) !== -1) {
workingSelection = workingSelection.filter(function (x) { return x !== id; });
} else {
addCoin(id, this.getAttribute('data-sym'), this.getAttribute('data-name'));
}
updateCount();
renderQuick();
renderSearchResults(document.getElementById('search-box').value);
});
});
}

async function ensureCoinList() {
if (coinListCache) return coinListCache;
var res = await fetch('https://api.coingecko.com/api/v3/coins/list');
if (!res.ok) throw new Error('list fetch failed');
coinListCache = await res.json();
return coinListCache;
}

async function renderSearchResults(query) {
var box = document.getElementById('search-results');
var hint = document.getElementById('search-hint');
query = (query || '').trim().toLowerCase();
if (query.length < 2) { box.innerHTML = ''; hint.textContent = '2文字以上で検索できます。'; return; }
hint.textContent = '検索中...';
var list;
try { list = await ensureCoinList(); } catch (e) { hint.textContent = '検索リストの取得に失敗しました。'; return; }
var matches = list.filter(function (c) {
return (c.symbol && c.symbol.toLowerCase() === query) ||
(c.symbol && c.symbol.toLowerCase().indexOf(query) === 0) ||
(c.name && c.name.toLowerCase().indexOf(query) !== -1) ||
(c.id && c.id.toLowerCase().indexOf(query) !== -1);
});
matches.sort(function (a, b) {
var ae = a.symbol && a.symbol.toLowerCase() === query ? 0 : 1;
var be = b.symbol && b.symbol.toLowerCase() === query ? 0 : 1;
return ae - be;
});
matches = matches.slice(0, 30);
hint.textContent = matches.length ? '' : '該当する銘柄が見つかりませんでした。';
box.innerHTML = matches.map(function (c) {
var added = workingSelection.indexOf(c.id) !== -1;
return '<div class="result-opt' + (added ? ' added' : '') + '" data-id="' + c.id +
'" data-sym="' + (c.symbol || '').toUpperCase() + '" data-name="' + (c.name || '').replace(/"/g, '') + '">' +
'<span>' + (c.name || c.id) + '<span class="sym">' + (c.symbol || '').toUpperCase() + '</span></span>' +
'<span>' + (added ? '追加済み' : '＋追加') + '</span></div>';
}).join('');
Array.prototype.forEach.call(box.querySelectorAll('.result-opt'), function (el) {
el.addEventListener('click', function () {
var id = this.getAttribute('data-id');
if (workingSelection.indexOf(id) !== -1) return;
if (workingSelection.length >= MAX_COINS) { updateCount(); return; }
addCoin(id, this.getAttribute('data-sym'), this.getAttribute('data-name'));
renderSearchResults(document.getElementById('search-box').value);
});
});
}

function openModal() {
workingSelection = getSelectedCoins();
updateCount();
renderQuick();
document.getElementById('search-box').value = '';
document.getElementById('search-results').innerHTML = '';
document.getElementById('search-hint').textContent = '';
document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
document.getElementById('modal-overlay').classList.remove('open');
}
function saveModal() {
var ids = workingSelection.slice(0, MAX_COINS);
if (ids.length === 0) ids = DEFAULT_COINS.slice();
try {
localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
var labels = {};
ids.forEach(function (id) { if (COIN_LABELS[id]) labels[id] = COIN_LABELS[id]; });
localStorage.setItem(STORAGE_KEY + '_labels', JSON.stringify(labels));
} catch (e) {}
closeModal();
loadPrices();
}

document.getElementById('ticker-edit').addEventListener('click', openModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-save').addEventListener('click', saveModal);
document.getElementById('modal-overlay').addEventListener('click', function (e) {
if (e.target === this) closeModal();
});
document.getElementById('search-box').addEventListener('input', function () {
var v = this.value;
clearTimeout(searchTimer);
searchTimer = setTimeout(function () { renderSearchResults(v); }, 300);
});

loadPrices();
setInterval(loadPrices, 120000);

/* ===== ニュース ===== */
async function loadNews() {
var grid = document.getElementById('news-grid');
var meta = document.getElementById('news-meta');
try {
var res = await fetch('news.json?t=' + Date.now());
if (!res.ok) throw new Error('fetch failed');
var data = await res.json();
var items = data.items || [];
if (items.length === 0) {
grid.innerHTML = '<div class="error">現在表示できるニュースがありません。</div>';
meta.textContent = '';
return;
}
if (data.updatedAt) {
var d = new Date(data.updatedAt);
meta.textContent = '最終更新：' + d.toLocaleString('ja-JP') + '（' + items.length + '件）';
}
grid.innerHTML = items.map(function (it) {
var title = escapeHtml(it.title);
var link = encodeURI(it.link);
var source = escapeHtml(it.source || '');
return '<article class="card">' +
'<span class="cat">暗号資産</span>' +
'<h2><a href="' + link + '" target="_blank" rel="noopener noreferrer">' + title + '</a></h2>' +
'<div class="source">出典：<a href="' + link + '" target="_blank" rel="noopener noreferrer">' + source + '</a></div>' +
'</article>';
}).join('');
} catch (e) {
grid.innerHTML = '<div class="error">ニュースの読み込みに失敗しました。時間をおいて再度お試しください。</div>';
meta.textContent = '';
}
}
function escapeHtml(s) {
return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
loadNews();
</script>
</body>
</html>
