name: Fetch crypto news

on:
  schedule:
    # 毎日 00:00 UTC = 日本時間 朝9時に実行
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch RSS and build news.json
        run: node scripts/fetch-news.js
      - name: Commit updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update news.json [skip ci]"
            git push
          fi
